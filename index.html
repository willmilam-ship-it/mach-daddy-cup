  :root { color-scheme: light; }

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

  }

  }

    color: #2a3a1f; text-transform: uppercase; letter-spacing: 0.04em;

  .lb-name { font-weight: 600; color: #1f2a1a; }

  .lb-points { font-weight: 700; font-size: 18px; color: #2a3a1f; }

  .round-card { cursor: pointer; transition: transform 0.05s; }
  .round-card:active { transform: scale(0.99); }
  .round-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .round-title { font-weight: 700; color: #2a3a1f; }
  .round-sess { font-size: 11px; color: #6f7a62; margin-top: 1px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .badge.upcoming { background: #f0ecdf; color: #6f7a62; }
  .badge.active { background: #fde8c3; color: #8a5a12; }
  .badge.complete { background: #d6e7c4; color: #3d5a1c; }

    display: flex; gap: 8px; margin-top: 10px;
    align-items: center; font-size: 12px; flex-wrap: wrap;

  .pair-vs { color: #6f7a62; font-weight: 600; }
  .format-line { font-size: 12px; color: #6f7a62; margin-top: 6px; font-style: italic; }
  .score-grid { display: grid; width: 100%; font-size: 13px; }
  .sc-head {
    display: grid;
    grid-template-columns: 28px 28px 28px repeat(4, 1fr);
    background: #f5f3ee; font-weight: 700; color: #6f7a62;

    padding: 6px 4px; border-radius: 6px 6px 0 0;
    gap: 2px; text-align: center;
  }
  .sc-row {
    display: grid;
    grid-template-columns: 28px 28px 28px repeat(4, 1fr);

    gap: 2px; align-items: center; text-align: center;
  }

    padding: 6px 4px; border-radius: 0 0 6px 6px;
    border-bottom: 0;
  }
  .sc-cell { padding: 2px 0; }
  .sc-par { color: #6f7a62; font-size: 11px; }
  .sc-si { color: #b0a98f; font-size: 10px; }
  .sc-input {
    width: 100%; appearance: none;
    border: 1px solid transparent; background: transparent;
    text-align: center; font-size: 15px; padding: 6px 0;
    font-weight: 600; color: #1f2a1a; border-radius: 6px;
    font-family: inherit;
  }
  .sc-input:focus { outline: none; border-color: #5b7a3a; background: #fff; }
  .sc-input.bird { color: #b45309; background: #fef3c7; }
  .sc-input.eagle { color: #b45309; background: #fde68a; font-weight: 800; }
  .sc-input.bogey { color: #475569; background: #f1f5f9; }
  .sc-input.dbogey { color: #64748b; background: #e2e8f0; }
  .sc-input.par { color: #1f2a1a; }
  .team1-bg { background: rgba(59, 113, 186, 0.06); }
  .team2-bg { background: rgba(198, 102, 46, 0.06); }
  .btn {
    appearance: none; border: 0; background: #3a5024;
    color: #fff; font-weight: 600; padding: 10px 16px;
    border-radius: 10px; font-size: 14px; cursor: pointer;
    font-family: inherit;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: #3a5024; border: 1px solid #3a5024; }
  .btn.small { padding: 6px 10px; font-size: 12px; }
  .btn.danger { background: #b23b2a; }
  .match-bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 12px 14px;
    background: linear-gradient(to right, rgba(59, 113, 186, 0.1), rgba(198, 102, 46, 0.1));
    border-radius: 10px; margin-bottom: 12px; font-size: 13px;
  }
  .match-status { font-weight: 700; font-size: 16px; color: #2a3a1f; text-align: center; flex: 1; }
  .team-name { font-weight: 600; font-size: 12px; line-height: 1.3; }
  .team-name.t1 { color: #3b71ba; }
  .team-name.t2 { color: #c6662e; }
  .field { margin-bottom: 10px; }

  .field input, .field select {
    width: 100%; padding: 9px 10px;

    background: #fff; font-size: 14px; font-family: inherit;
    color: #1f2a1a;
  }
  .field.row { display: grid; grid-template-columns: 1fr 100px; gap: 8px; align-items: end; }
  .pot-summary { display: flex; justify-content: space-between; align-items: baseline; }
  .pot-summary .amt { font-size: 22px; font-weight: 800; color: #2a3a1f; }
  .pot-list { margin-top: 8px; }
  .pot-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid #f0ecdf; font-size: 13px;
  }
  .pot-row:last-child { border-bottom: 0; }
  .hole-select {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 6px; padding: 8px 0; border-bottom: 1px solid #f0ecdf;
    align-items: center; font-size: 13px;
  }
  .hole-select:last-child { border-bottom: 0; }
  select.inline {
    padding: 4px 6px; font-size: 12px;
    border: 1px solid #d8d2bd; border-radius: 6px;
    background: #fff; font-family: inherit;
  }
  .back {
    appearance: none; background: transparent; border: 0;
    color: #3a5024; font-weight: 600; padding: 4px 0;
    cursor: pointer; font-size: 13px; margin-bottom: 8px;
    font-family: inherit;
  }
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #2a3a1f; color: #fff; padding: 10px 16px; border-radius: 10px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100; max-width: 80%;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  /* tees strip */
  .tee-row {
    display: grid;
    grid-template-columns: 18px 1fr auto auto;
    gap: 8px; align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f0ecdf;
  }
  .tee-row:last-child { border-bottom: 0; }
  .tee-dot { width: 14px; height: 14px; border-radius: 50%; }
  .tee-player { font-weight: 600; font-size: 14px; color: #1f2a1a; }
  .tee-player small { display: block; color: #6f7a62; font-weight: 400; font-size: 11px; }
  .tee-select {
    padding: 6px 8px; font-size: 12px;
    border: 1px solid #d8d2bd; border-radius: 6px;
    background: #fff; font-family: inherit;
    max-width: 180px;
  }
  .tee-ch {
    font-weight: 700; font-size: 15px; color: #2a3a1f;
    min-width: 36px; text-align: right;
  }
  .tee-ch small { display: block; color: #6f7a62; font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .bulk-bar {
    display: flex; gap: 6px; margin-top: 10px;
    padding-top: 10px; border-top: 1px solid #f0ecdf;
    align-items: center; flex-wrap: wrap;
  }
  .bulk-bar .muted { font-size: 11px; margin-right: 4px; }

let ui = { tab: "leaderboard", activeRoundId: null };

function loadState() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    // If current key not present, try previous keys (and migrate)
    if (!raw) {
      for (const k of PREV_STORAGE_KEYS) {
        raw = localStorage.getItem(k);
        if (raw) break;
      }
    }
    if (!raw) return structuredClone(DEFAULT_STATE);
    const s = JSON.parse(raw);
    s.pots = s.pots || DEFAULT_STATE.pots;
    s.pots.longestDriveHoles = s.pots.longestDriveHoles || {};
    s.pots.longestDriveWinners = s.pots.longestDriveWinners || {};
    s.pots.closestPinHoles = s.pots.closestPinHoles || {};
    s.pots.closestPinWinners = s.pots.closestPinWinners || {};
    // Migration: ensure tees on each round
    s.rounds.forEach(r => {
      if (!r.tees) {
        const c = DEFAULT_COURSES[r.course];
        r.tees = { p0: c.defaultTee, p1: c.defaultTee, p2: c.defaultTee, p3: c.defaultTee };
      }
      // Remove old handicapOverrides if present
      if (r.handicapOverrides) delete r.handicapOverrides;
      // v5 -> v6 migration: Castle Stuart tees reordered
      //   old: 0=Blacks, 1=Blues(now Greens, was misnamed), 2=Whites(was 68.3/125, now real Whites 72.6/136)
      //   new: 0=Blacks, 1=Whites (more challenging than old Whites), 2=Greens (default — was old "Blues")
      // Remap so a player still sits on roughly the same tees they had before:
      //   old 0 (Blacks) -> new 0 (Blacks)
      //   old 1 (Blues)  -> new 2 (Greens) — same rating/slope
      //   old 2 (Whites) -> new 2 (Greens) — old Whites were the forward tees; closest match is Greens
      if (r.course === "castleStuart" && r._csV6 !== true) {
        const remap = { 0: 0, 1: 2, 2: 2 };
        for (const k of ["p0","p1","p2","p3"]) {
          if (r.tees[k] != null && remap[r.tees[k]] != null) r.tees[k] = remap[r.tees[k]];
        }
        r._csV6 = true;
      }
      // Course data refresh (Jun 2026): official scorecards for Dornoch & Struie
      // (new Green/Orange/Grey/Blue tees), Tain (4 tees, corrected ratings),
      // Fortrose (par 71 from all men's tees), Castle Stuart (corrected hole par/SI).
      // Refresh hole data; reset tee picks where the tee list itself changed.
      if (r._coursesV8 !== true) {
        const c = DEFAULT_COURSES[r.course];
        if (c) {
          r.holes = JSON.parse(JSON.stringify(c.holes));
          r.par = c.par;
          if (["dornoch","struie","tain"].includes(r.course)) {
            r.tees = { p0: c.defaultTee, p1: c.defaultTee, p2: c.defaultTee, p3: c.defaultTee };
          } else {
            for (const k of ["p0","p1","p2","p3"]) {
              if (r.tees[k] == null || r.tees[k] >= c.tees.length) r.tees[k] = c.defaultTee;
            }
          }
        }
        r._coursesV8 = true;
      }
      // Format change (Jun 2026): rounds 1/3/5 four-ball match play, 2/4 four-ball
      // aggregate match (sum of both nets), 6 individual Stableford (3/2/1/0 cup pts).
      if (r._fmtV9 !== true) {
        const fmtMap = { r1: "fourball-match", r2: "fourball-aggregate-match", r3: "fourball-match",
                         r4: "fourball-aggregate-match", r5: "fourball-match", r6: "individual-stableford" };
        if (fmtMap[r.id] && r.status !== "complete") r.format = fmtMap[r.id];
        r._fmtV9 = true;
      }
    });
    // Migration: rename .handicap to .handicapIndex
    s.players.forEach(p => {
      if (p.handicapIndex == null && p.handicap != null) {
        p.handicapIndex = p.handicap;
        delete p.handicap;
      }
      if (p.handicapIndex == null) p.handicapIndex = 12.0;
    });
    // Roster update (Jun 2026): Peter replaced by Daniel; real handicap indexes.
    // Only overwrites the old 12.0 placeholders — manually entered values survive.
    if (s._rosterV7 !== true) {
      const realHI = { p0: 10.4, p1: 10.5, p2: 11.4, p3: 5.6 };
      s.players.forEach(p => {
        if (p.id === "p2" && p.name === "Peter") p.name = "Daniel";
        if (p.handicapIndex === 12.0 && realHI[p.id] != null) p.handicapIndex = realHI[p.id];
      });
      s._rosterV7 = true;
    }
    return s;
  } catch (e) {
    return structuredClone(DEFAULT_STATE);
  }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.error("Save failed:", e); }
  if (typeof schedulePush === "function") schedulePush();
}

function resetState() {
  if (!confirm("Reset ALL scores, settings, and pots? This cannot be undone.")) return;
  state = structuredClone(DEFAULT_STATE);
  saveState();
  render();
  toast("Everything reset");
}

// Compute Course Handicap: round(HI × Slope/113 + (Rating − Par))
function courseHandicap(hi, tee, par) {
  if (hi == null || !tee) return 0;
  return Math.round(hi * tee.slope / 113 + (tee.rating - par));
}

function playerTeeForRound(round, playerIdx) {
  const course = DEFAULT_COURSES[round.course];
  const teeIdx = round.tees?.["p"+playerIdx] ?? course.defaultTee;
  return course.tees[teeIdx];
}

function effectiveCourseHandicap(round, playerIdx) {
  const course = DEFAULT_COURSES[round.course];
  const tee = playerTeeForRound(round, playerIdx);
  const hi = state.players[playerIdx].handicapIndex || 0;
  // If the tee defines its own par (e.g. Fortrose Yellows/Reds at par 70 vs Blacks/Whites at par 71), use it.
  const par = tee.par ?? course.par;
  return courseHandicap(hi, tee, par);
}

function strokesOnHole(courseHandicap, si) {
  if (courseHandicap <= 0) return 0;
  let strokes = Math.floor(courseHandicap / 18);
  if ((courseHandicap % 18) >= si) strokes += 1;
  return strokes;
}

function stablefordPoints(gross, par, strokes) {
  if (gross == null || gross === "") return 0;
  const net = gross - strokes;
  const diff = net - par;
  if (diff <= -2) return 4;
  if (diff === -1) return 3;
  if (diff === 0)  return 2;
  if (diff === 1)  return 1;
  return 0;
}

function isBirdie(gross, par) {
  return gross != null && gross !== "" && gross < par;
}

function computeRound(round) {
  const fmt = FORMATS[round.format];
  const result = {
    holes: [],
    playerTotals: { gross: [0,0,0,0], stableford: [0,0,0,0], birdies: [0,0,0,0] },
    teamTotals: { gross: [0,0], stableford: [0,0] },
    matchStatus: { team1Up: 0, throughHole: 0, holesRemaining: 18, result: null },
    teamPoints: [0, 0],
    complete: false,
  };

  // Course handicaps for this round, driven by each player's tee selection
  const CH = [0,1,2,3].map(i => effectiveCourseHandicap(round, i));
  let holesPlayed = 0;
  let matchNet = 0;

  for (let h = 0; h < 18; h++) {
    const { par, si } = round.holes[h];
    const holeData = { par, si, playerGross: [], playerNet: [], playerPoints: [], playerBirdie: [] };

    if (fmt.mode === "individual") {
      for (let p = 0; p < 4; p++) {
        const gross = round.scores["p"+p][h];
        const strokes = strokesOnHole(CH[p], si);
        const net = gross != null ? gross - strokes : null;
        const pts = stablefordPoints(gross, par, strokes);
        holeData.playerGross[p] = gross;
        holeData.playerNet[p] = net;
        holeData.playerPoints[p] = pts;
        holeData.playerBirdie[p] = isBirdie(gross, par);
        if (gross != null) {
          result.playerTotals.gross[p] += gross;
          result.playerTotals.stableford[p] += pts;
          if (holeData.playerBirdie[p]) result.playerTotals.birdies[p] += 1;
        }
      }

      const [t1, t2] = round.pairing;
      const t1Nets = t1.map(p => holeData.playerNet[p]).filter(v => v != null);
      const t2Nets = t2.map(p => holeData.playerNet[p]).filter(v => v != null);
      const t1Pts  = t1.map(p => holeData.playerPoints[p]);
      const t2Pts  = t2.map(p => holeData.playerPoints[p]);
      const t1Gross = t1.map(p => holeData.playerGross[p]).filter(v => v != null);
      const t2Gross = t2.map(p => holeData.playerGross[p]).filter(v => v != null);
      const t1BestGross = t1Gross.length ? Math.min(...t1Gross) : null;
      const t2BestGross = t2Gross.length ? Math.min(...t2Gross) : null;
      const t1BestNet = t1Nets.length ? Math.min(...t1Nets) : null;
      const t2BestNet = t2Nets.length ? Math.min(...t2Nets) : null;
      const t1BestPts = Math.max(...t1Pts);
      const t2BestPts = Math.max(...t2Pts);

      holeData.teamGross = [t1BestGross, t2BestGross];
      holeData.teamNet = [t1BestNet, t2BestNet];
      holeData.teamPts = [t1BestPts, t2BestPts];

      if (fmt.resultType === "match" && t1BestNet != null && t2BestNet != null) {
        if (t1BestNet < t2BestNet) matchNet += 1;
        else if (t2BestNet < t1BestNet) matchNet -= 1;
        holesPlayed = h + 1;
        result.teamTotals.gross[0] += t1BestGross;
        result.teamTotals.gross[1] += t2BestGross;
      }
      if (fmt.resultType === "aggregate-match") {
        // Both partners' nets count: team hole score = SUM of the two net scores
        const t1All = t1.every(p => holeData.playerNet[p] != null);
        const t2All = t2.every(p => holeData.playerNet[p] != null);
        if (t1All && t2All) {
          const a1 = t1.reduce((s, p) => s + holeData.playerNet[p], 0);
          const a2 = t2.reduce((s, p) => s + holeData.playerNet[p], 0);
          holeData.teamNet = [a1, a2];
          if (a1 < a2) matchNet += 1;
          else if (a2 < a1) matchNet -= 1;
          holesPlayed = h + 1;
          result.teamTotals.gross[0] += t1.reduce((s, p) => s + holeData.playerGross[p], 0);
          result.teamTotals.gross[1] += t2.reduce((s, p) => s + holeData.playerGross[p], 0);
        }
      }
      if (fmt.resultType === "individual") {
        if ([0,1,2,3].every(p => holeData.playerGross[p] != null)) holesPlayed = h + 1;
      }
      if (fmt.resultType === "stableford") {
        if (t1BestPts != null) result.teamTotals.stableford[0] += t1BestPts;
        if (t2BestPts != null) result.teamTotals.stableford[1] += t2BestPts;
        if (t1BestGross != null && t2BestGross != null) {
          holesPlayed = h + 1;
          result.teamTotals.gross[0] += t1BestGross;
          result.teamTotals.gross[1] += t2BestGross;
        }
      }
    }
    else {
      const t1 = round.teamScores.t1[h];
      const t2 = round.teamScores.t2[h];
      const [t1p, t2p] = round.pairing;
      const t1CH = Math.min(CH[t1p[0]], CH[t1p[1]]);
      const t2CH = Math.min(CH[t2p[0]], CH[t2p[1]]);
      const t1Strokes = strokesOnHole(t1CH, si);
      const t2Strokes = strokesOnHole(t2CH, si);
      const t1Net = t1 != null ? t1 - t1Strokes : null;
      const t2Net = t2 != null ? t2 - t2Strokes : null;
      holeData.teamGross = [t1, t2];
      holeData.teamNet = [t1Net, t2Net];

      if (t1 != null) result.teamTotals.gross[0] += t1;
      if (t2 != null) result.teamTotals.gross[1] += t2;
      if (t1 != null) result.teamTotals.stableford[0] += stablefordPoints(t1, par, t1Strokes);
      if (t2 != null) result.teamTotals.stableford[1] += stablefordPoints(t2, par, t2Strokes);

      if (fmt.resultType === "match" && t1Net != null && t2Net != null) {
        if (t1Net < t2Net) matchNet += 1;
        else if (t2Net < t1Net) matchNet -= 1;
        holesPlayed = h + 1;
      }
      if (fmt.resultType === "medal" && t1 != null && t2 != null) {
        holesPlayed = h + 1;
      }
    }

    result.holes.push(holeData);
  }

  if (fmt.resultType === "match" || fmt.resultType === "aggregate-match") {
    const holesRemaining = 18 - holesPlayed;
    result.matchStatus = { team1Up: matchNet, throughHole: holesPlayed, holesRemaining, result: null };
    // Closeout fires only when the match is mathematically decided BEFORE 18
    // (lead > holes remaining AND at least one hole still to play).
    if (holesPlayed < 18 && Math.abs(matchNet) > holesRemaining) {
      const closeout = `${Math.abs(matchNet)} & ${holesRemaining}`;
      result.matchStatus.result = matchNet > 0 ? `Team 1 wins ${closeout}` : `Team 2 wins ${closeout}`;
      result.complete = true;
    } else if (holesPlayed === 18) {
      if (matchNet > 0) result.matchStatus.result = `Team 1 wins ${matchNet} up`;
      else if (matchNet < 0) result.matchStatus.result = `Team 2 wins ${-matchNet} up`;
      else result.matchStatus.result = "Match halved";
      result.complete = true;
    }
  } else if (fmt.resultType === "medal") {
    if (holesPlayed === 18) {
      const [a, b] = result.teamTotals.gross;
      if (a < b) result.matchStatus.result = `Team 1 wins ${b - a} stroke${b-a===1?"":"s"}`;
      else if (b < a) result.matchStatus.result = `Team 2 wins ${a - b} stroke${a-b===1?"":"s"}`;
      else result.matchStatus.result = "Tied";
      result.complete = true;
    }
  } else if (fmt.resultType === "stableford") {
    if (holesPlayed === 18) {
      const [a, b] = result.teamTotals.stableford;
      if (a > b) result.matchStatus.result = `Team 1 wins by ${a - b} pts`;
      else if (b > a) result.matchStatus.result = `Team 2 wins by ${b - a} pts`;
      else result.matchStatus.result = "Tied on points";
      result.complete = true;
    }
  } else if (fmt.resultType === "individual") {
    if (holesPlayed === 18) {
      const pts = result.playerTotals.stableford;
      const ranked = [0,1,2,3].map(i => ({ i, p: pts[i] })).sort((a, b) => b.p - a.p);
      const tiedTop = ranked.filter(r => r.p === ranked[0].p);
      result.matchStatus.result = tiedTop.length > 1
        ? `${tiedTop.map(r => state.players[r.i].name).join(" & ")} tie at ${ranked[0].p} pts`
        : `${state.players[ranked[0].i].name} wins with ${ranked[0].p} pts`;
      result.individualRanking = ranked;
      result.complete = true;
    }
  }

  const perPlayer = [0,0,0,0];
  result.winners = [];
  if (result.complete && fmt.resultType === "individual") {
    // Finale pays 3/2/1/0 by Stableford rank; ties share the better rank's points
    const ranked = result.individualRanking;
    const award = [3, 2, 1, 0];
    let pos = 0;
    while (pos < 4) {
      let end = pos;
      while (end + 1 < 4 && ranked[end + 1].p === ranked[pos].p) end++;
      for (let k = pos; k <= end; k++) perPlayer[ranked[k].i] = award[pos];
      pos = end + 1;
    }
    result.winners = ranked.filter(r => r.p === ranked[0].p).map(r => r.i);
  } else if (result.complete && result.matchStatus.result) {
    const r = result.matchStatus.result;
    if (/Team 1 wins/.test(r)) { round.pairing[0].forEach(p => perPlayer[p] = 2); result.winners = round.pairing[0].slice(); }
    else if (/Team 2 wins/.test(r)) { round.pairing[1].forEach(p => perPlayer[p] = 2); result.winners = round.pairing[1].slice(); }
    else if (/halved|Tied/i.test(r)) round.pairing.flat().forEach(p => perPlayer[p] = 1);
  }
  result.perPlayerPoints = perPlayer;

  round.status = result.complete ? "complete" : (holesPlayed > 0 ? "active" : "upcoming");
  return result;
}

function computeCup() {
  const totals = state.players.map(p => ({
    name: p.name, color: p.color, id: p.id,
    points: 0, stableford: 0, birdies: 0, roundWins: 0
  }));
  state.rounds.forEach(r => {
    const res = computeRound(r);
    for (let i = 0; i < 4; i++) {
      totals[i].points += res.perPlayerPoints[i];
      if (res.winners && res.winners.includes(i)) totals[i].roundWins += 1;
      totals[i].stableford += res.playerTotals.stableford[i];
      totals[i].birdies += res.playerTotals.birdies[i];
    }
  });
  return totals;
}

function currentHatWearer() {
  for (let i = state.rounds.length - 1; i >= 0; i--) {
    const r = state.rounds[i];
    const res = computeRound(r);
    if (!res.complete) continue;
    if (res.winners && res.winners.length) return { round: r, players: res.winners };
  }
  return null;
}

function activeRound() {
  const active = state.rounds.find(r => r.status === "active");
  if (active) return active;
  return state.rounds.find(r => r.status === "upcoming");
}

function render() {
  document.querySelectorAll("nav.tabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === ui.tab);
  });
  const view = document.getElementById("view");
  if (ui.tab === "leaderboard") renderLeaderboard(view);
  else if (ui.tab === "rounds") renderRounds(view);
  else if (ui.tab === "pots") renderPots(view);
  else if (ui.tab === "setup") renderSetup(view);
}

function renderLeaderboard(view) {
  document.getElementById("topTitle").textContent = "Mach Daddy Cup 2026";
  const totals = computeCup();
  const completed = state.rounds.filter(r => r.status === "complete").length;
  document.getElementById("topSub").textContent = `Scotland · June 11–15 · ${completed} of 6 rounds complete`;

  const sorted = [...totals].sort((a,b) => b.points - a.points || b.stableford - a.stableford);
  const hat = currentHatWearer();
  const ar = activeRound();

  view.innerHTML = "";

  const hero = el("div", "cup-banner");
  const leadTxt = completed === 0
    ? `🏆 Tournament starts Fri Jun 12 at Royal Dornoch`
    : `🏆 ${sorted[0].name} leads`;
  const subTxt = completed === 0
    ? `Six rounds. Rotating 2v2 teams. Glory for the last cap standing.`
    : `${sorted[0].points} pts · ${sorted[0].stableford} Stableford · ${sorted[0].birdies} birdies`;
  hero.innerHTML = `
    <div class="cup-title">${leadTxt}</div>
    <div class="cup-sub">${subTxt}</div>
    ${hat ? `<div class="cup-hat">👒 Current cap wearers: <b>${hat.players.map(i => state.players[i].name).join(" & ")}</b> (${hat.round.name})</div>` : ''}
  `;
  view.appendChild(hero);

  const lb = el("div", "card");
  lb.innerHTML = `<h2>Leaderboard</h2>`;
  sorted.forEach((t, rank) => {
    const row = el("div", "lb-row" + (rank === 0 ? " first" : ""));
    const initials = initialsOf(t.name);
    row.innerHTML = `
      <div class="lb-rank">${rank+1}</div>
      <div class="avatar" style="background:${t.color}">${initials}</div>
      <div>
        <div class="lb-name">${escapeHtml(t.name)}</div>
        <div class="lb-meta">${t.roundWins} round win${t.roundWins===1?"":"s"} · ${t.stableford} Stbf · ${t.birdies} 🐦</div>
      </div>
      <div class="lb-points">${t.points}<small>points</small></div>
    `;
    lb.appendChild(row);
  });
  view.appendChild(lb);

  if (ar) {
    const res = computeRound(ar);
    const card = el("div", "card round-card");
    card.innerHTML = `
      <div class="round-head">
        <div>
          <div class="round-title">${escapeHtml(ar.name)}</div>
          <div class="round-sess">${ar.session} · ${FORMATS[ar.format].label}</div>
        </div>
        <span class="badge ${ar.status}">${ar.status}</span>
      </div>
      ${pairingHtml(ar)}
      ${res.matchStatus.throughHole > 0 ? `<div class="format-line">Through hole ${res.matchStatus.throughHole} · ${res.matchStatus.result || matchHeading(res)}</div>` : `<div class="format-line">Tap to start scoring</div>`}
    `;
    card.onclick = () => openRound(ar.id);
    view.appendChild(card);
  }
}

function matchHeading(res) {
  const n = res.matchStatus.team1Up;
  if (n === 0) return "All square";
  if (n > 0) return `Team 1 up ${n}`;
  return `Team 2 up ${-n}`;
}

function pairingHtml(round) {
  if (FORMATS[round.format].resultType === "individual") {
    return `<div class="round-pair"><span class="pair-badge" style="color:#5b7a3a">Every man for himself</span></div>`;
  }
  const [t1, t2] = round.pairing;
  const name = i => escapeHtml(state.players[i].name);
  return `
    <div class="round-pair">
      <span class="pair-badge" style="color:#3b71ba">${name(t1[0])} + ${name(t1[1])}</span>
      <span class="pair-vs">vs</span>
      <span class="pair-badge" style="color:#c6662e">${name(t2[0])} + ${name(t2[1])}</span>
    </div>
  `;
}

function indivHeading(res) {
  if (!res.matchStatus.throughHole) return null;
  const pts = res.playerTotals.stableford;
  const max = Math.max(...pts);
  const leaders = [0,1,2,3].filter(i => pts[i] === max);
  if (leaders.length === 4) return `All level · ${max} pts`;
  return `${leaders.map(i => escapeHtml(state.players[i].name)).join(" & ")} lead${leaders.length > 1 ? "" : "s"} · ${max} pts`;
}

function renderRounds(view) {
  document.getElementById("topTitle").textContent = "Rounds";
  document.getElementById("topSub").textContent = "Six rounds · three pairings · each played twice";
  view.innerHTML = "";
  state.rounds.forEach((r, i) => {
    const res = computeRound(r);
    const card = el("div", "card round-card");
    card.innerHTML = `
      <div class="round-head">
        <div>
          <div class="round-title">Round ${i+1} · ${escapeHtml(r.name)}</div>
          <div class="round-sess">${r.session}</div>
        </div>
        <span class="badge ${r.status}">${r.status}</span>
      </div>
      ${pairingHtml(r)}
      <div class="format-line">${FORMATS[r.format].label}${res.matchStatus.result ? " · " + res.matchStatus.result : res.matchStatus.throughHole ? " · through " + res.matchStatus.throughHole : ""}</div>
    `;
    card.onclick = () => openRound(r.id);
    view.appendChild(card);
  });
}

function openRound(roundId) {
  ui.activeRoundId = roundId;
  ui.tab = "round-detail";
  const view = document.getElementById("view");
  renderRoundDetail(view);
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
  document.querySelector("nav.tabs button[data-tab='rounds']").classList.add("active");
}

function renderRoundDetail(view) {
  const round = state.rounds.find(r => r.id === ui.activeRoundId);
  if (!round) return;
  const course = DEFAULT_COURSES[round.course];
  const fmt = FORMATS[round.format];
  const res = computeRound(round);

  document.getElementById("topTitle").textContent = round.name;
  document.getElementById("topSub").textContent = `${round.session} · ${fmt.label}`;

  view.innerHTML = "";
  const back = el("button", "back");
  back.textContent = "← Back to rounds";
  back.onclick = () => { ui.tab = "rounds"; render(); };
  view.appendChild(back);

  const bar = el("div", "match-bar");
  if (fmt.resultType === "individual") {
    bar.innerHTML = `
      <div class="match-status" style="flex:1; text-align:center;">${res.matchStatus.result || indivHeading(res) || "Not started"}<div class="muted" style="font-size:11px; margin-top:2px; font-weight:400;">thru ${res.matchStatus.throughHole} · 1st 3pts · 2nd 2 · 3rd 1</div></div>
    `;
  } else {
    bar.innerHTML = `
      <div class="team-name t1">${escapeHtml(state.players[round.pairing[0][0]].name)}<br/>${escapeHtml(state.players[round.pairing[0][1]].name)}</div>
      <div class="match-status">${res.matchStatus.result || matchHeading(res) || "Not started"}<div class="muted" style="font-size:11px; margin-top:2px; font-weight:400;">thru ${res.matchStatus.throughHole}</div></div>
      <div class="team-name t2" style="text-align:right">${escapeHtml(state.players[round.pairing[1][0]].name)}<br/>${escapeHtml(state.players[round.pairing[1][1]].name)}</div>
    `;
  }
  view.appendChild(bar);

  // Tees card — replaces old "Handicaps today"
  const teesCard = el("div", "card");
  teesCard.innerHTML = `
    <h2>Tees & Course Handicaps</h2>
    <div class="muted" style="margin-bottom:8px;">Pick each player's tees before the round. Course Handicap = round(HI × Slope ÷ 113 + (Rating − Par)).</div>
    <div id="teesList"></div>
    <div class="bulk-bar">
      <span class="muted">Set all to:</span>
      ${course.tees.map((t, i) => `<button class="btn ghost small" data-bulktee="${i}">${escapeHtml(t.name)}</button>`).join("")}
    </div>
  `;
  view.appendChild(teesCard);
  const teesList = teesCard.querySelector("#teesList");
  state.players.forEach((p, i) => {
    const teeIdx = round.tees["p"+i] ?? course.defaultTee;

function buildScorecard(round, res) {
  const wrap = el("div", "score-grid");
  const head = el("div", "sc-head");

  const fmt = FORMATS[round.format];
  const isIndividual = fmt.mode === "individual";

  if (isIndividual) {
    head.innerHTML = `
      <div>H</div><div>P</div><div>SI</div>
      ${state.players.map(p => `<div style="color:${p.color}">${escapeHtml(p.name.replace(/\./g,''))}</div>`).join("")}
    `;
  } else {
    head.style.gridTemplateColumns = "28px 28px 28px 1fr 1fr";
    head.innerHTML = `
      <div>H</div><div>P</div><div>SI</div>
      <div style="color:#3b71ba">Team 1</div>
      <div style="color:#c6662e">Team 2</div>
    `;
  }
  wrap.appendChild(head);

  for (let h = 0; h < 18; h++) {
    const hole = round.holes[h];
    const row = el("div", "sc-row");
    if (!isIndividual) row.style.gridTemplateColumns = "28px 28px 28px 1fr 1fr";

    if (isIndividual) {
      row.innerHTML = `
        <div class="sc-cell"><b>${h+1}</b></div>
        <div class="sc-cell sc-par">${hole.par}</div>
        <div class="sc-cell sc-si">${hole.si}</div>
        ${state.players.map((p, pi) => {
          const team = round.pairing[0].includes(pi) ? "team1-bg" : "team2-bg";
          const val = round.scores["p"+pi][h];
          const cls = scoreClass(val, hole.par);
          return `<div class="sc-cell ${team}"><input type="number" inputmode="numeric" min="1" max="15" class="sc-input ${cls}" data-player="${pi}" data-hole="${h}" value="${val ?? ""}" /></div>`;
        }).join("")}
      `;
    } else {
      const t1 = round.teamScores.t1[h];
      const t2 = round.teamScores.t2[h];
      row.innerHTML = `
        <div class="sc-cell"><b>${h+1}</b></div>
        <div class="sc-cell sc-par">${hole.par}</div>
        <div class="sc-cell sc-si">${hole.si}</div>
        <div class="sc-cell team1-bg"><input type="number" inputmode="numeric" min="1" max="15" class="sc-input ${scoreClass(t1, hole.par)}" data-team="1" data-hole="${h}" value="${t1 ?? ""}" /></div>
        <div class="sc-cell team2-bg"><input type="number" inputmode="numeric" min="1" max="15" class="sc-input ${scoreClass(t2, hole.par)}" data-team="2" data-hole="${h}" value="${t2 ?? ""}" /></div>
      `;
    }
    wrap.appendChild(row);

    if (h === 8 || h === 17) {
      const tot = el("div", "sc-row totals");
      if (!isIndividual) tot.style.gridTemplateColumns = "28px 28px 28px 1fr 1fr";
      const start = h === 8 ? 0 : 9;
      const end = h + 1;
      const parSum = round.holes.slice(start, end).reduce((a,x) => a + x.par, 0);
      if (isIndividual) {
        const sums = state.players.map((p, pi) =>
          round.scores["p"+pi].slice(start, end).reduce((a,v) => a + (v||0), 0)
        );
        tot.innerHTML = `
          <div></div><div>${parSum}</div><div></div>
          ${sums.map(s => `<div>${s || "—"}</div>`).join("")}
        `;
      } else {
        const s1 = round.teamScores.t1.slice(start, end).reduce((a,v) => a + (v||0), 0);
        const s2 = round.teamScores.t2.slice(start, end).reduce((a,v) => a + (v||0), 0);
        tot.innerHTML = `
          <div></div><div>${parSum}</div><div></div>
          <div>${s1 || "—"}</div><div>${s2 || "—"}</div>
        `;
      }
      wrap.appendChild(tot);
    }
  }

  wrap.querySelectorAll(".sc-input").forEach(inp => {
    inp.addEventListener("input", (e) => {
      const val = e.target.value === "" ? null : parseInt(e.target.value, 10);
      if (val != null && (isNaN(val) || val < 1)) return;
      const h = parseInt(e.target.dataset.hole, 10);
      if (e.target.dataset.player != null) {
        const p = parseInt(e.target.dataset.player, 10);
        round.scores["p"+p][h] = val;
      } else {
        const t = e.target.dataset.team;
        round.teamScores["t"+t][h] = val;
      }
      saveState();
    });
    inp.addEventListener("blur", () => {
      const view = document.getElementById("view");
      renderRoundDetail(view);
    });
  });

  return wrap;
}

function scoreClass(gross, par) {
  if (gross == null) return "";
  const d = gross - par;
  if (d <= -2) return "eagle";
  if (d === -1) return "bird";
  if (d === 0)  return "par";
  if (d === 1)  return "bogey";
  return "dbogey";
}

  return clean.slice(0,2).toUpperCase();
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ============================================================
// LIVE SYNC (Supabase Realtime; whole-state last-write-wins by rev)
// One shared row (cup_state id=1). Every save pushes {rev, device, data}.
// Incoming rows with a higher rev from another device replace local state.
// Keep ONE designated scorer per round to avoid offline-edit conflicts.
// ============================================================
const SYNC = {
  url: "https://lyhdmnrowikiodzcdegl.supabase.co",
  key: "sb_publishable_xQV1myVYcDCKsWQt3u8Q_Q_JSOAdHe2", // browser-safe publishable key
  client: null, deviceId: null, rev: 0,
  pushTimer: null, dirty: false, pendingRender: false,
};

(function loadSyncMeta() {
  try {
    const m = JSON.parse(localStorage.getItem("machDaddySync_v1") || "{}");
    SYNC.deviceId = m.deviceId || (crypto.randomUUID ? crypto.randomUUID() : "d" + Math.random().toString(36).slice(2));
    SYNC.rev = m.rev || 0;
  } catch (e) { SYNC.deviceId = "d" + Math.random().toString(36).slice(2); }
  persistSyncMeta();
})();

function persistSyncMeta() {
  try { localStorage.setItem("machDaddySync_v1", JSON.stringify({ deviceId: SYNC.deviceId, rev: SYNC.rev })); } catch (e) {}
}

function setDot(s) {
  let d = document.getElementById("syncDot");
  if (!d) {
    // render() may rewrite the header line; re-create the dot
    const sub = document.getElementById("topSub");
    if (!sub) return;
    d = document.createElement("span");
    d.id = "syncDot";
    d.title = "Live sync status";
    sub.appendChild(d);
  }
  d.className = s === "live" ? "live" : (s === "sync" ? "sync" : "");
}

function schedulePush() {
  clearTimeout(SYNC.pushTimer);
  SYNC.pushTimer = setTimeout(pushState, 700);
}

async function pushState() {
  if (!SYNC.client) return;
  SYNC.rev += 1;
  persistSyncMeta();
  setDot("sync");
  try {
    const { error } = await SYNC.client.from("cup_state")
      .upsert({ id: 1, rev: SYNC.rev, device: SYNC.deviceId, data: state });
    SYNC.dirty = !!error;
    setDot(error ? "off" : "live");
  } catch (e) { SYNC.dirty = true; setDot("off"); }
}

function applyRemote(row) {
  if (!row || !row.data || !row.data.players) return;             // ignore seed/empty
  if (row.device === SYNC.deviceId) {                              // our own write echoed back
    if (row.rev > SYNC.rev) { SYNC.rev = row.rev; persistSyncMeta(); }
    return;
  }
  if (row.rev <= SYNC.rev) return;                                 // stale or already seen
  SYNC.rev = row.rev;
  persistSyncMeta();
  state = row.data;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  const ae = document.activeElement;
  const typing = ae && (ae.tagName === "INPUT" || ae.tagName === "SELECT" || ae.tagName === "TEXTAREA");
  if (typing) SYNC.pendingRender = true;                           // don't yank the keyboard mid-entry
  else render();
}

document.addEventListener("focusout", () => {
  if (SYNC.pendingRender) { SYNC.pendingRender = false; setTimeout(render, 50); }
});

async function pollRemote() {
  if (!SYNC.client) return;
  try {
    const { data, error } = await SYNC.client.from("cup_state").select("rev,device,data").eq("id", 1).single();
    if (error) { setDot("off"); return; }
    if (data.rev > SYNC.rev) applyRemote(data);
    else if (data.rev < SYNC.rev || SYNC.dirty) { SYNC.dirty = false; pushState(); } // we have newer local (scored offline) — catch up
    setDot("live");
  } catch (e) { setDot("off"); }
}

(function initSync() {
  if (!window.supabase) { setDot("off"); return; }                 // CDN blocked/offline: app still works locally
  SYNC.client = window.supabase.createClient(SYNC.url, SYNC.key);
  SYNC.client
    .channel("cup")
    .on("postgres_changes", { event: "*", schema: "public", table: "cup_state" }, payload => applyRemote(payload.new))
    .subscribe(status => setDot(status === "SUBSCRIBED" ? "live" : "off"));
  pollRemote();                                                    // initial catch-up
  setInterval(pollRemote, 20000);                                  // websocket fallback for flaky course wifi
})();
</script>
